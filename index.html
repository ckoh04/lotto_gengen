
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Gen Gen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode">Dark Mode</button>
        </div>
        <h1>Lottery Gen Gen</h1>
        <div class="lottery-selection">
            <input type="radio" id="mega-millions" name="lottery" value="mega-millions" checked>
            <label for="mega-millions">
                <img src="favicons/megamillions_logo.png" alt="Mega Millions" class="lottery-logo mega-millions-logo">
            </label>
            <input type="radio" id="powerball" name="lottery" value="powerball">
            <label for="powerball">
                <img src="favicons/powerball_logo.png" alt="Powerball" class="lottery-logo powerball-logo">
            </label>
        </div>
        <div id="powerball-options" class="powerball-options">
            <input type="checkbox" id="power-play" name="power-play">
            <label for="power-play">Power Play</label>
            <input type="checkbox" id="double-play" name="double-play">
            <label for="double-play">Double Play</label>
        </div>
        <button id="generate-btn">Generate Numbers</button>
        <div id="results-container">
            <div id="main-numbers-container" class="numbers-container"></div>
            <div id="power-play-container" class="power-play-container"></div>
            <div id="double-play-container" class="double-play-container">
                <h2>Double Play Numbers</h2>
                <div id="double-play-numbers-container" class="numbers-container"></div>
            </div>
        </div>
        <p class="business-inquiry-trigger">
            <button id="business-inquiry-toggle" class="business-inquiry-toggle" type="button" aria-controls="partnership-section" aria-expanded="false">
                Business Inquiry
            </button>
        </p>
        <section id="partnership-section" class="partnership-section is-hidden">
            <h2>Business Partnership Inquiry</h2>
            <form class="partnership-form" action="https://formspree.io/f/xaqdzkvl" method="POST">
                <input type="hidden" name="_subject" value="New Business Partnership Inquiry">
                <label for="partner-name">Name</label>
                <input id="partner-name" name="name" type="text" required>

                <label for="partner-email">Email</label>
                <input id="partner-email" name="email" type="email" required>

                <label for="partner-company">Company</label>
                <input id="partner-company" name="company" type="text">

                <label for="partner-message">Inquiry</label>
                <textarea id="partner-message" name="message" rows="5" required></textarea>

                <button type="submit">Send Inquiry</button>
            </form>
        </section>
        <p>Check the latest results on <a href="https://www.usamega.com/" target="_blank">USA Mega</a>.</p>
    </div>
    <script src="main.js"></script>
</body>
</html>
